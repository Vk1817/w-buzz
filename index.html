<!DOCTYPE html>  
<html>  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Willow-Cricbuzz</title>     

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">  

  <style>  
   * { margin: 0; padding: 0; box-sizing: border-box; }  
    html, body {  
      background: #000;  
      height: 100vh;  
      width: 100vw;  
      overflow: hidden;  
      font-family: system-ui, -apple-system, sans-serif;  
    }  
    .shaka-video-container {  
      position: absolute;  
      inset: 0;  
      width: 100%;  
      height: 100%;  
    }  
    video {  
      width: 100%;  
      height: 100%;  
      background: #000;  
      object-fit: contain;  
    }  
    .shaka-spinner-container { display: none !important; }  
  </style>  
</head>  

<body>  

  <div class="shaka-video-container" id="player-container" data-shaka-player>  
    <video id="video" autoplay muted playsinline preload="metadata" poster="https://i.ibb.co/VrsnMcD/image-search-1765615733453.webp"></video>  
  </div>  
  
  <script>  

    // ✅ AD LOGIC (ONLY ONCE)
    let adShown = false;
    function openAdOnce(){
      if(!adShown){
        adShown = true;
        window.open("https://offstump.com", "_blank");
      }
    }

    async function initApp() {  
      shaka.polyfill.installAll();  
      if (shaka.Player.isBrowserSupported()) {  
        initPlayer();  
      } else {  
        console.error('Browser not supported!');  
      }  
    }

    async function initPlayer() {  
      const video = document.getElementById('video');  
      const container = document.getElementById('player-container');  

      // 👉 CLICK AD TRIGGER
      container.addEventListener("click", openAdOnce);

      const player = new shaka.Player(video);  
      
      const ui = new shaka.ui.Overlay(player, container, video);  
      ui.configure({  
        controlPanelElements: [  
          'play_pause', 'time_and_duration', 'mute', 'volume',  
          'spacer', 'quality', 'picture_in_picture', 'fullscreen'  
        ],  
        seekBarColors: {  
          base: 'rgba(255, 255, 0, 0.3)',  
          buffered: 'rgba(255, 255, 0, 0.5)',  
          played: 'rgb(255, 255, 0)'  
        }  
      });  
  
      const streamUrl = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/4ncgjuq0f0/out/v1/f7306c616dc84f3c9f5ed27c605a5f3c/cenc.mpd";  
      
      player.configure({  
        drm: {  
          clearKeys: {  
            "cd52cd6287d4421c03ac06c93348752c": "784ba87ab8a33fc18bc1c146191329ac"  
          }  
        },  
        manifest: {
          retryParameters: {
            maxAttempts: 5,
            baseDelay: 1000,
            backoffFactor: 2
          }
        },
        streaming: {  
          lowLatencyMode: true,  
          jumpLargeGaps: true,
          rebufferingGoal: 2,
          bufferingGoal: 10
        }  
      });  
  
      player.addEventListener('error', (e) => console.error('Shaka Error:', e.detail));  
  
      try {  
        await player.load(streamUrl);  
        console.log("Stream successfully loaded!");  
      } catch (error) {  
        console.error('Error loading stream:', error);  
      }  
    }  

    document.addEventListener('shaka-ui-loaded', initApp);
    document.addEventListener('DOMContentLoaded', () => { if (!window.shaka) initApp(); });

  </script>  

</body>  
</html>
